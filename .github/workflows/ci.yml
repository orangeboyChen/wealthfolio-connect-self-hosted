name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  # realSession (futu/ibkr) requires live broker daemons — excluded from unit coverage.
  COVERAGE_THRESHOLD: "80"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Generate mocks
        # Mocks are not committed to the repo; regenerate them so that
        # `go vet` / golangci-lint can compile the test files that import them.
        run: go generate ./...
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  test:
    # NOTE: keep this number in sync with env.COVERAGE_THRESHOLD below.
    # GitHub Actions disallows ${{ env.* }} in job.name, so the threshold is
    # inlined here; the actual gate still reads env.COVERAGE_THRESHOLD.
    name: Test (≥80% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Generate mocks
        run: go generate ./...
      - name: Run tests with coverage
        run: |
          go test ./... -race -coverprofile=cov.out -covermode=atomic
      - name: Enforce coverage threshold
        run: |
          # Strip auto-generated mocks and the binary entrypoint from the
          # coverage profile so the gate reflects code we actually own.
          grep -vE "/mocks/|/cmd/server/main.go" cov.out > cov.filtered.out
          head -1 cov.out > cov.final.out
          tail -n +2 cov.filtered.out >> cov.final.out
          go tool cover -func=cov.final.out | tee cov.txt
          total=$(go tool cover -func=cov.final.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Total coverage (filtered): ${total}%"
          awk -v t="${total}" -v thr="${COVERAGE_THRESHOLD}" 'BEGIN {if (t+0 < thr+0) {print "Coverage below threshold ("thr"%)"; exit 1}}'
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: cov.txt

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: wealthfolio-connect-self-hosted:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
