name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # needed to create the GitHub Release entry
  packages: write       # needed to push to ghcr.io
  id-token: write       # needed for build provenance attestation
  attestations: write   # needed for actions/attest-build-provenance

env:
  GO_VERSION: "1.26"
  # realSession (futu/ibkr) requires live broker daemons — excluded from unit coverage.
  COVERAGE_THRESHOLD: "80"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Quality gate — never ship a tag that does not pass lint + tests.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Generate mocks
        run: go generate ./...
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  test:
    # NOTE: keep this number in sync with env.COVERAGE_THRESHOLD below.
    # GitHub Actions disallows ${{ env.* }} in job.name, so the threshold is
    # inlined here; the actual gate still reads env.COVERAGE_THRESHOLD.
    name: Test (≥80% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Generate mocks
        run: go generate ./...
      - name: Run tests with coverage
        run: |
          go test ./... -race -coverprofile=cov.out -covermode=atomic
      - name: Enforce coverage threshold
        run: |
          grep -vE "/mocks/|/cmd/server/main.go" cov.out > cov.filtered.out
          head -1 cov.out > cov.final.out
          tail -n +2 cov.filtered.out >> cov.final.out
          go tool cover -func=cov.final.out | tee cov.txt
          total=$(go tool cover -func=cov.final.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Total coverage (filtered): ${total}%"
          awk -v t="${total}" -v thr="${COVERAGE_THRESHOLD}" 'BEGIN {if (t+0 < thr+0) {print "Coverage below threshold ("thr"%)"; exit 1}}'

  # ---------------------------------------------------------------------------
  # 2. Build & push the multi-arch image, then sign provenance.
  # ---------------------------------------------------------------------------
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push (linux/amd64, linux/arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ---------------------------------------------------------------------------
  # 3. Publish a GitHub Release with auto-generated notes.
  # ---------------------------------------------------------------------------
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for full changelog generation
      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Container image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            Supported platforms: `linux/amd64`, `linux/arm64`.
            Image digest: `${{ needs.docker.outputs.digest }}`
